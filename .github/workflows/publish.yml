name: Publish to npm

# Triggers on:
#  1. Publishing a GitHub Release (the recommended path — bump version,
#     create a release with tag like v0.1.1, this workflow auto-publishes).
#  2. Manual dispatch (Actions tab → Publish to npm → Run workflow) for
#     hotfix scenarios where you've already pushed but want to re-publish.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Enables npm provenance attestation (no secret leak risk)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Verify package version matches release tag
        if: github.event_name == 'release'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG_VERSION). Bump package.json and re-tag."
            exit 1
          fi
          echo "Version match: $PKG_VERSION"

      - name: Build
        run: yarn build

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
